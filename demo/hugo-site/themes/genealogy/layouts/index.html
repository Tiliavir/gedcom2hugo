{{ define "main" }}
<h1>{{ .Site.Title }}</h1>
<p>{{ .Site.Params.description }}</p>

<h2>Browse the Family Tree</h2>

<h3>People</h3>
<ul>
{{ range where .Site.Pages "Section" "person" }}
    <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
{{ end }}
</ul>

<h3>Families</h3>
<ul>
{{ range where .Site.Pages "Section" "family" }}
    <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
{{ end }}
</ul>
{{ end }}
